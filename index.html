<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Push Day · Workout</title>
    <script type="importmap">
    {
        "imports": {
            "preact": "https://esm.sh/preact@10.19.3",
            "preact/hooks": "https://esm.sh/preact@10.19.3/hooks",
            "htm/preact": "https://esm.sh/htm@3.1.1/preact?external=preact"
        }
    }
    </script>
    <style>
        /* ─── Apple Design Tokens ─── */
        :root {
            /* Surfaces — pure iOS dark */
            --bg:        #000000;
            --card:      #1c1c1e;
            --raised:    #2c2c2e;
            --fill:      rgba(118,118,128,0.18);

            /* Text — Apple label scale */
            --t1:  #ffffff;
            --t2:  rgba(235,235,245,0.60);
            --t3:  rgba(235,235,245,0.30);
            --sep: rgba(60,60,67,0.36);

            /* iOS system colours — dark mode */
            --blue:   #0a84ff;
            --green:  #30d158;
            --red:    #ff453a;
            --orange: #ff9f0a;
            --teal:   #5ac8fa;
            --indigo: #5e5ce6;
            --purple: #bf5af2;
        }

        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

        html { -webkit-font-smoothing:antialiased; -moz-osx-font-smoothing:grayscale; }

        body {
            font-family: -apple-system, 'SF Pro Display', 'SF Pro Text', 'Helvetica Neue', sans-serif;
            background: var(--bg);
            color: var(--t1);
            min-height: 100vh;
        }

        /* ─── Animations ─── */
        @keyframes up   { from { opacity:0; transform:translateY(16px) } to { opacity:1; transform:none } }
        @keyframes pop  { 0% { opacity:0; transform:scale(.88) } 65% { transform:scale(1.03) } 100% { opacity:1; transform:none } }
        @keyframes beat { 0%,100% { transform:scale(1) } 14% { transform:scale(1.22) } 28% { transform:scale(1) } 45% { transform:scale(1.12) } }
        @keyframes grow { from { transform:scaleY(0) } to { transform:scaleY(1) } }
        @keyframes draw { to { stroke-dashoffset:0 } }

        /* ─── Page shell ─── */
        .page { max-width: 430px; margin: 0 auto; }

        /* ════════════════════════════════
           HERO — pure black, no gradient
        ════════════════════════════════ */
        .hero {
            background: #000;
            padding: 80px 24px 36px;
            text-align: center;
        }

        .hero-eyebrow {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            font-weight: 600;
            letter-spacing: .08em;
            text-transform: uppercase;
            color: var(--green);
            margin-bottom: 14px;
            animation: up .45s ease-out both;
        }
        .hero-eyebrow::before {
            content: '';
            width: 7px; height: 7px;
            background: var(--green);
            border-radius: 50%;
            animation: beat 2s ease-in-out infinite;
        }

        .hero-h1 {
            font-size: 64px;
            font-weight: 700;
            letter-spacing: -3.5px;
            line-height: .98;
            margin-bottom: 14px;
            animation: up .45s ease-out .06s both;
        }

        .hero-meta {
            font-size: 15px;
            color: var(--t2);
            letter-spacing: -.3px;
            animation: up .45s ease-out .12s both;
        }

        /* ─── Stat tiles ─── */
        .stat-row {
            display: grid;
            grid-template-columns: repeat(3,1fr);
            gap: 10px;
            padding: 28px 20px 0;
            animation: up .5s ease-out .18s both;
        }

        .stat-tile {
            background: var(--card);
            border-radius: 18px;
            padding: 16px 12px 14px;
            text-align: center;
        }

        .stat-icon {
            font-size: 22px;
            margin-bottom: 8px;
            display: block;
        }

        .stat-val {
            font-size: 26px;
            font-weight: 700;
            letter-spacing: -1px;
            line-height: 1;
            margin-bottom: 5px;
        }

        .stat-key {
            font-size: 11px;
            color: var(--t2);
            letter-spacing: -.1px;
        }

        /* ════════════════════════════════
           SEGMENTED CONTROL — exact iOS
        ════════════════════════════════ */
        .seg-bar {
            position: sticky;
            top: 0;
            z-index: 20;
            padding: 10px 20px;
            background: rgba(0,0,0,.82);
            backdrop-filter: saturate(180%) blur(24px);
            -webkit-backdrop-filter: saturate(180%) blur(24px);
            border-bottom: .5px solid var(--sep);
        }

        .seg {
            display: flex;
            background: rgba(118,118,128,.24);  /* exact iOS value */
            border-radius: 9px;
            padding: 2px;
        }

        .seg-btn {
            flex: 1;
            padding: 6px 4px;
            border: none;
            border-radius: 7px;
            font-family: inherit;
            font-size: 13px;
            font-weight: 400;
            letter-spacing: -.2px;
            color: var(--t2);
            background: transparent;
            cursor: pointer;
            transition: all .15s ease;
        }

        /* Active pill — white, like iOS light segment */
        .seg-btn.on {
            background: rgba(255,255,255,.92);
            color: #000;
            font-weight: 600;
            box-shadow:
                0 3px 8px rgba(0,0,0,.24),
                0 1px 2px rgba(0,0,0,.16);
        }

        /* ════════════════════════════════
           CONTENT
        ════════════════════════════════ */
        .content {
            background: var(--bg);
            padding: 28px 16px 80px;
        }

        .sect { margin-bottom: 36px; }

        .sect-label {
            font-size: 12px;
            font-weight: 600;
            letter-spacing: .07em;
            text-transform: uppercase;
            color: var(--t3);
            margin-bottom: 12px;
            padding: 0 4px;
        }

        /* ─── Card ─── */
        .card {
            background: var(--card);
            border-radius: 18px;
            overflow: hidden;
        }

        .cp { padding: 22px; }   /* card pad */

        /* ════════════════════════════════
           HEART RATE — Apple Health style
        ════════════════════════════════ */
        .hr-head {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            margin-bottom: 20px;
        }

        .hr-label-row { display: flex; align-items: center; gap: 10px; }

        .hr-dot {
            width: 36px; height: 36px;
            background: rgba(255,69,58,.18);
            border-radius: 9px;
            display: flex; align-items: center; justify-content: center;
            font-size: 18px;
            animation: beat 1.4s ease-in-out infinite;
            flex-shrink: 0;
        }

        .hr-name  { font-size: 16px; font-weight: 600; letter-spacing: -.4px; }
        .hr-sub   { font-size: 12px; color: var(--t2); margin-top: 1px; }

        .hr-bpm {
            text-align: right;
        }
        .hr-bpm-n {
            /* Apple Health: big, light-weight, red */
            font-size: 52px;
            font-weight: 300;
            letter-spacing: -3px;
            line-height: 1;
            color: var(--red);
        }
        .hr-bpm-u {
            font-size: 14px;
            color: var(--t2);
            letter-spacing: -.2px;
            margin-top: 2px;
        }

        /* Chart */
        .hr-chart { height: 88px; margin-bottom: 18px; }
        .hr-chart svg { width:100%; height:100%; overflow:visible; }
        .hr-line {
            fill: none;
            stroke: url(#hrGrad);
            stroke-width: 1.5;
            stroke-linecap: round;
            stroke-linejoin: round;
            stroke-dasharray: 1000;
            stroke-dashoffset: 1000;
            animation: draw 2.4s ease-out forwards;
        }
        .hr-area { fill: url(#hrFade); }

        /* 4 stat cells */
        .hr-cells {
            display: grid;
            grid-template-columns: repeat(4,1fr);
            gap: 8px;
        }
        .hr-cell {
            background: var(--raised);
            border-radius: 11px;
            padding: 10px 6px;
            text-align: center;
        }
        .hr-cv { font-size: 14px; font-weight: 600; letter-spacing: -.4px; }
        .hr-ck { font-size: 10px; color: var(--t3); text-transform: uppercase; letter-spacing: .05em; margin-top: 2px; }

        /* ════════════════════════════════
           VOLUME — bar chart
        ════════════════════════════════ */
        .vol-legend {
            display: flex; gap: 14px;
            margin-bottom: 16px;
        }
        .vol-dot  { width:7px; height:7px; border-radius:50%; }
        .vol-lg-t { font-size:12px; color:var(--t2); display:flex; align-items:center; gap:5px; }

        .vol-chart {
            display: flex;
            align-items: flex-end;
            height: 110px;
            gap: 8px;
        }
        .vol-grp {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            height: 100%;
        }
        .vol-bars {
            display: flex;
            align-items: flex-end;
            gap: 2px;
            flex: 1;
            width: 100%;
            justify-content: center;
        }
        .vol-b {
            width: 100%;
            max-width: 10px;
            border-radius: 3px 3px 0 0;
            transform-origin: bottom;
            animation: grow .6s cubic-bezier(.34,1.56,.64,1) backwards;
        }
        .vol-b.b1 { background: var(--teal);   }
        .vol-b.b2 { background: var(--indigo); }
        .vol-b.b3 { background: var(--purple); }
        .vol-lbl  { font-size:10px; color:var(--t3); text-align:center; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; max-width:100%; }

        /* ════════════════════════════════
           INTENSITY HEATMAP
        ════════════════════════════════ */
        .heat-grid {
            display: grid;
            grid-template-columns: repeat(7,1fr);
            gap: 8px;
            margin-bottom: 14px;
        }
        .heat-cell {
            aspect-ratio: 1;
            border-radius: 9px;
            transition: transform .2s;
        }
        .heat-cell:hover { transform: scale(1.12); }
        .heat-legend { display:flex; align-items:center; gap:8px; }
        .heat-bar { flex:1; height:4px; border-radius:2px; background:linear-gradient(90deg,var(--teal),var(--indigo),var(--orange),var(--red)); }
        .heat-lbl { font-size:11px; color:var(--t3); }

        /* ════════════════════════════════
           EXERCISE LIST — iOS table rows
        ════════════════════════════════ */
        .ex-list { padding: 0 20px 4px; }

        .ex-list-head {
            padding: 18px 20px 14px;
        }
        .ex-list-title { font-size:17px; font-weight:600; letter-spacing:-.4px; }
        .ex-list-sub   { font-size:13px; color:var(--t2); margin-top:2px; }

        .ex-row {
            display: flex;
            align-items: flex-start;
            gap: 13px;
            padding: 12px 0;
            border-top: .5px solid var(--sep);
            animation: up .4s ease-out backwards;
        }

        .ex-icon {
            width: 38px; height: 38px;
            background: var(--raised);
            border-radius: 9px;
            display: flex; align-items: center; justify-content: center;
            font-size: 17px;
            flex-shrink: 0;
            transition: transform .2s;
        }
        .ex-row:hover .ex-icon { transform: scale(1.1) rotate(-6deg); }

        .ex-body { flex:1; min-width:0; }
        .ex-name { font-size:15px; font-weight:600; letter-spacing:-.3px; margin-bottom:6px; }
        .chips   { display:flex; gap:4px; flex-wrap:wrap; }
        .chip    { background:var(--fill); padding:3px 9px; border-radius:6px; font-size:12px; font-weight:500; }
        .chip-w  { color:var(--blue); }
        .chip-r  { color:var(--t2); font-size:11px; }
        .ex-chev { color:var(--t3); font-size:18px; align-self:center; flex-shrink:0; font-weight:400; }

        /* ════════════════════════════════
           SHARE WIDGET — iOS lock widget
        ════════════════════════════════ */
        .share-w {
            background: var(--card);
            border-radius: 22px;
            overflow: hidden;
        }
        .share-body { padding: 22px; }

        .share-top {
            display: flex;
            align-items: center;
            gap: 13px;
            margin-bottom: 22px;
        }
        .share-av {
            width: 44px; height: 44px;
            background: linear-gradient(135deg, var(--orange), var(--red));
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 21px;
            flex-shrink: 0;
        }
        .share-n  { font-size:17px; font-weight:600; letter-spacing:-.4px; }
        .share-dt { font-size:13px; color:var(--t2); margin-top:1px; }

        .share-nums {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 20px;
        }
        .share-num {
            background: var(--fill);
            border-radius: 14px;
            padding: 16px;
        }
        .share-nv { font-size:30px; font-weight:700; letter-spacing:-1.4px; line-height:1; margin-bottom:4px; }
        .share-nk { font-size:12px; color:var(--t2); }

        .share-quote {
            font-size:15px;
            font-style:italic;
            line-height:1.55;
            letter-spacing:-.25px;
            color: var(--t2);
            padding: 16px 0;
            border-top:  .5px solid var(--sep);
            border-bottom: .5px solid var(--sep);
            margin-bottom: 16px;
        }
        .share-foot { text-align:center; font-size:12px; color:var(--t3); letter-spacing:-.1px; }

        /* ─── Primary button — full pill ─── */
        .btn {
            width: 100%;
            margin-top: 14px;
            padding: 15px;
            background: var(--blue);
            border: none;
            border-radius: 9999px;
            color: #fff;
            font-family: inherit;
            font-size: 17px;
            font-weight: 600;
            letter-spacing: -.3px;
            cursor: pointer;
            transition: opacity .15s, transform .12s;
        }
        .btn:hover  { opacity: .85; }
        .btn:active { opacity: .70; transform: scale(.98); }

        /* ─── Responsive ─── */
        @media (max-width: 380px) {
            .hero-h1  { font-size: 50px; letter-spacing: -2.8px; }
            .hr-cells { grid-template-columns: repeat(2,1fr); }
            .vol-b    { max-width: 8px; }
        }
    </style>
</head>
<body>
<div id="app"></div>
<script type="module">
import { h, render } from 'preact';
import { useState } from 'preact/hooks';
import htm from 'https://esm.sh/htm@3.1.1';
const html = htm.bind(h);

/* ── Data ── */
const w = {
    date: 'Apr 1, 2025',
    exercises: [
        { name:'Push Ups',                 icon:'💪', sets:[{wt:'BW',   reps:25},{wt:'BW',  reps:25}],              intensity:.60 },
        { name:'Chest Press',              icon:'🏋️', sets:[{wt:'25kg', reps:15,vol:375},{wt:'30kg',reps:15,vol:450},{wt:'34kg',reps:15,vol:510}], intensity:.85 },
        { name:'Cable Fly',                icon:'🎯', sets:[{wt:'2.5kg',reps:15,vol:37.5},{wt:'BW',reps:15,vol:0},{wt:'BW',reps:15,vol:0}],       intensity:.70 },
        { name:'Arnold Press',             icon:'🦾', sets:[{wt:'10lbs',reps:15,vol:150},{wt:'15lbs',reps:15,vol:225},{wt:'15lbs',reps:15,vol:225}], intensity:.75 },
        { name:'Lateral + Frontal Raises', icon:'⚡', sets:[{wt:'5lbs', reps:15,vol:75},{wt:'10lbs',reps:15,vol:150},{wt:'15+10lbs',reps:'8+8',vol:200}], intensity:.80 },
        { name:'Tricep Extension',         icon:'🔥', sets:[{wt:'20lbs',reps:20,vol:400},{wt:'25lbs',reps:15,vol:375},{wt:'25lbs',reps:15,vol:375}], intensity:.78 },
        { name:'Tricep Kickback',          icon:'💫', sets:[{wt:'10lbs',reps:15,vol:150},{wt:'15lbs',reps:15,vol:225},{wt:'15lbs',reps:15,vol:225}], intensity:.72 },
    ],
    cardio: {
        duration:'30:33', distance:2.86, calories:245,
        avgHR:142, minHR:101, maxHR:177, incline:2.5,
        hrData:[101,115,128,138,145,152,158,162,165,168,170,172,174,175,177,175,172,168,162,155,148,142,135,128,120,115,110,105,103,101]
    }
};
const totVol  = w.exercises.reduce((a,e) => a + e.sets.reduce((b,s) => b+(s.vol||0), 0), 0);
const totSets = w.exercises.reduce((a,e) => a + e.sets.length, 0);

/* ── Heart Rate Card ── */
const HR = () => {
    const d = w.cardio.hrData;
    const W=400, H=88, P=6;
    const lo=Math.min(...d)-4, hi=Math.max(...d)+4, rng=hi-lo;
    const pts = d.map((v,i) => {
        const x=(i/(d.length-1))*(W-P*2)+P;
        const y=H-((v-lo)/rng)*(H-P*2)-P;
        return `${x},${y}`;
    }).join(' ');
    const area = `${P},${H} ${pts} ${W-P},${H}`;
    return html`
        <div class="card">
          <div class="cp">
            <div class="hr-head">
              <div class="hr-label-row">
                <div class="hr-dot">❤️</div>
                <div>
                  <div class="hr-name">Heart Rate</div>
                  <div class="hr-sub">Treadmill · ${w.cardio.incline}% incline</div>
                </div>
              </div>
              <div class="hr-bpm">
                <div class="hr-bpm-n">${w.cardio.avgHR}</div>
                <div class="hr-bpm-u">AVG BPM</div>
              </div>
            </div>

            <div class="hr-chart">
              <svg viewBox="0 0 ${W} ${H}">
                <defs>
                  <linearGradient id="hrGrad" x1="0%" y1="0%" x2="100%" y2="0%">
                    <stop offset="0%"   stop-color="#5ac8fa"/>
                    <stop offset="55%"  stop-color="#bf5af2"/>
                    <stop offset="100%" stop-color="#ff453a"/>
                  </linearGradient>
                  <linearGradient id="hrFade" x1="0%" y1="0%" x2="0%" y2="100%">
                    <stop offset="0%"   stop-color="#ff453a" stop-opacity=".35"/>
                    <stop offset="100%" stop-color="#ff453a" stop-opacity="0"/>
                  </linearGradient>
                </defs>
                <polygon points="${area}" class="hr-area"/>
                <polyline points="${pts}"  class="hr-line"/>
              </svg>
            </div>

            <div class="hr-cells">
              <div class="hr-cell"><div class="hr-cv" style="color:#30d158">${w.cardio.duration}</div><div class="hr-ck">Time</div></div>
              <div class="hr-cell"><div class="hr-cv" style="color:#5ac8fa">${w.cardio.distance} km</div><div class="hr-ck">Dist</div></div>
              <div class="hr-cell"><div class="hr-cv" style="color:#ff9f0a">${w.cardio.calories}</div><div class="hr-ck">Cal</div></div>
              <div class="hr-cell"><div class="hr-cv" style="color:#ff453a">${w.cardio.maxHR}</div><div class="hr-ck">Peak</div></div>
            </div>
          </div>
        </div>`;
};

/* ── Volume Card ── */
const Vol = () => {
    const exs = w.exercises.filter(e=>e.sets.some(s=>s.vol)).slice(0,6);
    const mx  = Math.max(...exs.flatMap(e=>e.sets.map(s=>s.vol||0)));
    return html`
        <div class="card"><div class="cp">
          <div style="margin-bottom:6px;font-size:17px;font-weight:600;letter-spacing:-.4px">Volume Progression</div>
          <div style="font-size:13px;color:var(--t2);margin-bottom:18px">Weight × reps per set</div>
          <div class="vol-legend">
            <div class="vol-lg-t"><div class="vol-dot" style="background:#5ac8fa"/><span>Set 1</span></div>
            <div class="vol-lg-t"><div class="vol-dot" style="background:#5e5ce6"/><span>Set 2</span></div>
            <div class="vol-lg-t"><div class="vol-dot" style="background:#bf5af2"/><span>Set 3</span></div>
          </div>
          <div class="vol-chart">
            ${exs.map((ex,i)=>{
                const vs=ex.sets.map(s=>s.vol||0);
                return html`
                    <div class="vol-grp" key=${i}>
                      <div class="vol-bars">
                        ${vs.map((v,j)=>html`
                            <div class="vol-b b${j+1}"
                                 style="height:${v>0?(v/mx)*100:4}%;animation-delay:${(i*3+j)*.07}s"/>`)}
                      </div>
                      <div class="vol-lbl">${ex.name.split(' ')[0]}</div>
                    </div>`;
            })}
          </div>
        </div></div>`;
};

/* ── Intensity Card ── */
const Intensity = () => {
    const col = v => {
        if (v < .65) return 'linear-gradient(135deg,#5ac8fa,#2997ff)';
        if (v < .75) return 'linear-gradient(135deg,#5e5ce6,#bf5af2)';
        if (v < .82) return 'linear-gradient(135deg,#ff9f0a,#ffd60a)';
        return 'linear-gradient(135deg,#ff453a,#ff6b4a)';
    };
    return html`
        <div class="card"><div class="cp">
          <div style="margin-bottom:6px;font-size:17px;font-weight:600;letter-spacing:-.4px">Intensity</div>
          <div style="font-size:13px;color:var(--t2);margin-bottom:18px">Perceived effort by exercise</div>
          <div class="heat-grid">
            ${w.exercises.map((ex,i)=>html`
                <div class="heat-cell" key=${i}
                     style="background:${col(ex.intensity)}"
                     title="${ex.name} · ${Math.round(ex.intensity*100)}%"/>`)}
          </div>
          <div class="heat-legend">
            <span class="heat-lbl">Low</span>
            <div class="heat-bar"/>
            <span class="heat-lbl">High</span>
          </div>
        </div></div>`;
};

/* ── Exercises Card ── */
const Exercises = () => html`
    <div class="card">
      <div class="ex-list-head">
        <div class="ex-list-title">Workout Flow</div>
        <div class="ex-list-sub">7 exercises · ${totSets} sets</div>
      </div>
      <div class="ex-list">
        ${w.exercises.map((ex,i)=>html`
            <div class="ex-row" key=${i} style="animation-delay:${i*.06}s">
              <div class="ex-icon">${ex.icon}</div>
              <div class="ex-body">
                <div class="ex-name">${ex.name}</div>
                <div class="chips">
                  ${ex.sets.map((s,j)=>html`
                      <div class="chip" key=${j}>
                        <span class="chip-w">${s.wt}</span>
                        <span class="chip-r"> ×${s.reps}</span>
                      </div>`)}
                </div>
              </div>
              <div class="ex-chev">›</div>
            </div>`)}
      </div>
      <div style="height:8px"/>
    </div>`;

/* ── Share Widget ── */
const Share = () => html`
    <div class="share-w">
      <div class="share-body">
        <div class="share-top">
          <div class="share-av">💪</div>
          <div>
            <div class="share-n">Push Day Complete</div>
            <div class="share-dt">${w.date}</div>
          </div>
        </div>
        <div class="share-nums">
          <div class="share-num">
            <div class="share-nv" style="color:#0a84ff">${(totVol/1000).toFixed(1)}k</div>
            <div class="share-nk">Volume</div>
          </div>
          <div class="share-num">
            <div class="share-nv" style="color:#30d158">${totSets}</div>
            <div class="share-nk">Sets</div>
          </div>
          <div class="share-num">
            <div class="share-nv" style="color:#ff9f0a">${w.cardio.calories}</div>
            <div class="share-nk">Calories</div>
          </div>
          <div class="share-num">
            <div class="share-nv" style="color:#5ac8fa">${w.cardio.distance}</div>
            <div class="share-nk">Km Run</div>
          </div>
        </div>
        <div class="share-quote">"Push yourself because no one else is going to do it for you."</div>
        <div class="share-foot">WorkoutViz · ${w.date}</div>
      </div>
    </div>
    <button class="btn" onClick=${()=>alert('Share your workout!')}>Share Workout</button>`;

/* ── App ── */
const App = () => {
    const [tab, setTab] = useState('overview');
    return html`
        <div class="page">

          <!-- Hero -->
          <div class="hero">
            <div class="hero-eyebrow">Workout Complete</div>
            <h1 class="hero-h1">Push Day</h1>
            <p class="hero-meta">${w.date} · 7 exercises · ${w.cardio.duration}</p>
            <div class="stat-row">
              <div class="stat-tile" style="animation-delay:.2s">
                <span class="stat-icon">📊</span>
                <div class="stat-val" style="color:#0a84ff">${(totVol/1000).toFixed(1)}k</div>
                <div class="stat-key">Volume</div>
              </div>
              <div class="stat-tile" style="animation-delay:.26s">
                <span class="stat-icon">🔁</span>
                <div class="stat-val" style="color:#30d158">${totSets}</div>
                <div class="stat-key">Sets</div>
              </div>
              <div class="stat-tile" style="animation-delay:.32s">
                <span class="stat-icon">🔥</span>
                <div class="stat-val" style="color:#ff9f0a">${w.cardio.calories}</div>
                <div class="stat-key">Calories</div>
              </div>
            </div>
          </div>

          <!-- Segmented control -->
          <div class="seg-bar">
            <div class="seg">
              <button class="seg-btn ${tab==='overview'  ?'on':''}" onClick=${()=>setTab('overview')}>Overview</button>
              <button class="seg-btn ${tab==='exercises' ?'on':''}" onClick=${()=>setTab('exercises')}>Exercises</button>
              <button class="seg-btn ${tab==='share'     ?'on':''}" onClick=${()=>setTab('share')}>Share</button>
            </div>
          </div>

          <!-- Content -->
          <div class="content">

            ${tab==='overview' && html`
                <div style="animation:up .35s ease-out both">
                  <div class="sect">
                    <div class="sect-label">Cardio</div>
                    <${HR}/>
                  </div>
                  <div class="sect">
                    <div class="sect-label">Strength</div>
                    <${Vol}/>
                  </div>
                  <div class="sect">
                    <div class="sect-label">Effort</div>
                    <${Intensity}/>
                  </div>
                </div>`}

            ${tab==='exercises' && html`
                <div style="animation:up .35s ease-out both">
                  <div class="sect">
                    <div class="sect-label">All Exercises</div>
                    <${Exercises}/>
                  </div>
                </div>`}

            ${tab==='share' && html`
                <div style="animation:up .35s ease-out both">
                  <div class="sect">
                    <div class="sect-label">Summary</div>
                    <${Share}/>
                  </div>
                </div>`}

          </div>
        </div>`;
};

render(html`<${App}/>`, document.getElementById('app'));
</script>
</body>
</html>
